<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
        integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="trafficlight.css">
</head>

<body>
    <div class="background-page p-5">
        <h1 class='main-heading text-center'>Traffic Light</h1>
        <div class="d-flex flex-row justify-content-center">
            <div class="d-flex flex-column m-5">
                <button class="Stop m-2" id="stopButton" onClick="stopButton()">Stop</button>
                <button class="Ready m-2" id="readyButton" onClick="readyButton()">Ready</button>
                <button class="Go m-2" id="goButton" onClick="goButton()">Go</button>
            </div>
            <div class="signals-bg mt-4">
                <div class="light-1" id="stopLight"> </div>
                <div class="light-2" id="readyLight"> </div>
                <div class="light-3" id="goLight"> </div>
            </div>
        </div>
    </div>
    <script src="trafficlight.js"></script>
</body>

</html>
